[build]
  command = "echo Building Netlify Functions"
  publish = "public"
  functions = "netlify/functions"

[functions]
  external_node_modules = ["express", "mongoose", "bcryptjs"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/.netlify/functions/api"
  status = 200
  force = true
