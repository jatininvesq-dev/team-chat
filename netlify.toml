[build]
  command = "echo Building Netlify Functions"
  publish = "public"
  functions = "netlify/functions"

# Secrets: set MONGODB_URI and JWT_SECRET in Netlify UI (not in this file).
# Site configuration → Environment variables → Add variable → Redeploy site.

[functions]
  external_node_modules = ["express", "mongoose", "bcryptjs"]
  node_bundler = "esbuild"

[functions.api]
  timeout = 26

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/.netlify/functions/api"
  status = 200
  force = true
